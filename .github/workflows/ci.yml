name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    name: API — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Ruff
        working-directory: apps/api
        run: ruff check .
      - name: Pytest
        working-directory: apps/api
        run: pytest -q

  web:
    name: Web — lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Lint
        run: pnpm --filter @slash/web lint
      - name: Typecheck
        run: pnpm --filter @slash/web typecheck
      - name: Build
        run: pnpm --filter @slash/web build

  skills-schema:
    name: Skills — manifest schema stub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: |
          echo "Skill manifest schema validation lands in M1. See docs/04-skills-system.md §3.1"
          find skills -name skill.yaml -print
