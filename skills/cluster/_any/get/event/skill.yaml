apiVersion: slash/v1
kind: Skill
metadata:
  id: cluster.events
  name: "Recent cluster events"
  description: "Sorted by last-timestamp. Shows warnings and errors from recent minutes."
  version: 0.1.0
  labels: { stability: beta, risk: low }

spec:
  command: { namespace: cluster, target: _any, noun: [], verb: events }
  mode: read
  timeout: 20s
  profile: { kind: k8s, required: true }

  args:
    - { name: ns, flag: --ns, type: string }

  bash:
    argv:
      - kubectl
      - --context
      - "${profile.k8s.context}"
      - get
      - events
      - --sort-by=.lastTimestamp
      - -o
      - json
    expand:
      - when: ns
        as: ["-n", "${value}"]

  output:
    parse: json
    path: "items[]"
    kind: event-timeline
    columns:
      - { key: lastTimestamp,         label: "When",      renderer: relative-time }
      - { key: type,                  label: "Type",      renderer: state-badge }
      - { key: reason,                label: "Reason" }
      - { key: involvedObject.kind,   label: "Kind" }
      - { key: involvedObject.name,   label: "Object" }
      - { key: message,               label: "Message" }
    row_actions:
      - { label: "Pod events",   command: "/cluster pod events ${involvedObject.name} --ns ${metadata.namespace}" }
      - { label: "Describe pod", command: "/cluster describe ${involvedObject.name} --ns ${metadata.namespace}" }
      - { label: "Tail logs",    command: "/cluster logs ${involvedObject.name} --ns ${metadata.namespace} --since 15m" }
