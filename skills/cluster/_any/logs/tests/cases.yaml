cases:
  - name: "happy path · with since"
    input: "/cluster logs web-59d8c-abc --ns api --since 30m"
    mock:
      stdout: "happy.txt"
      exit: 0
    expect:
      state: "ok"
      body_equals:
        skill_id: "cluster.logs"

  - name: "no since flag still OK"
    input: "/cluster logs web-59d8c-abc --ns api"
    mock:
      stdout: "happy.txt"
      exit: 0
    expect:
      state: "ok"
