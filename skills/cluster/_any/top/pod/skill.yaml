apiVersion: slash/v1
kind: Skill
metadata:
  id: cluster.top
  name: "Pod resource usage"
  description: "Show CPU and memory per pod (requires metrics-server). Optional --ns narrows scope."
  version: 0.1.0
  labels: { stability: beta, risk: low }

spec:
  command: { namespace: cluster, target: _any, noun: [], verb: top }
  mode: read
  timeout: 15s
  profile: { kind: k8s, required: true }

  args:
    - { name: ns, flag: --ns, type: string }

  bash:
    argv:
      - kubectl
      - --context
      - "${profile.k8s.context}"
      - top
      - pod
      - --no-headers
    expand:
      - when: ns
        as: ["-n", "${value}"]

  output:
    parse: lines
    kind: table
    columns:
      - { key: "0", label: "Pod" }
      - { key: "1", label: "CPU" }
      - { key: "2", label: "Memory" }
