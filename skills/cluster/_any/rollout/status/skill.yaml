apiVersion: slash/v1
kind: Skill
metadata:
  id: cluster.rollout.status
  name: "Rollout status"
  description: "Block-read the rollout status of a Deployment until it's done or times out."
  version: 0.1.0
  labels: { stability: alpha, risk: low }

spec:
  command: { namespace: cluster, target: _any, noun: [rollout], verb: status }
  mode: read
  timeout: 180s
  profile: { kind: k8s, required: true }

  args:
    - { name: deploy,  type: string, positional: true, required: true }
    - { name: ns,      flag: --ns, type: string, required: true }
    - { name: timeout, flag: --timeout, type: duration, default: "60s" }

  bash:
    # --watch=true is the default; we force a bounded --timeout so the
    # single-step read can't hang the cockpit. The output is kubectl's
    # progress lines followed by "successfully rolled out" or a partial
    # state when the timeout fires — the banner view consumes both.
    argv:
      - kubectl
      - --context
      - "${profile.k8s.context}"
      - -n
      - "${ns}"
      - rollout
      - status
      - "deployment/${deploy}"
      - "--timeout=${timeout}"

  output:
    parse: text
    kind: rollout-banner
