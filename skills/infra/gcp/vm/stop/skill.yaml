apiVersion: slash/v1
kind: Skill
metadata:
  id: infra.gcp.vm.stop
  name: "Stop GCE instance"
  description: "Stop a Compute Engine instance. Persistent disks keep state; billing for vCPU/RAM stops."
  version: 0.1.0
  labels: { stability: beta, risk: high }

spec:
  command: { namespace: infra, target: gcp, noun: [vm], verb: stop }
  mode: write
  danger: true
  danger_reason: |
    Halts the instance. Workloads go unreachable until restart. Ephemeral IP
    is released on stop unless a static address was attached.
  approvers: 1
  timeout: 120s
  profile: { kind: gcp, required: true }

  args:
    - { name: name,   type: string, positional: true, required: true }
    - { name: zone,   flag: --zone, type: string, required: true }
    - { name: reason, flag: --reason, type: string, required: true }

  preflight:
    argv:
      - gcloud
      - compute
      - instances
      - describe
      - "${name}"
      - --zone
      - "${zone}"
      - --format=json

  bash:
    argv:
      - gcloud
      - compute
      - instances
      - stop
      - "${name}"
      - --zone
      - "${zone}"
      - --quiet

  rollback: "/infra gcp vm start ${name} --zone ${zone} --reason \"rollback stop\""

  output:
    parse: text
    kind: object
