apiVersion: slash/v1
kind: Skill
metadata:
  id: infra.gcp.vm.list
  name: "List GCP Compute Engine instances"
  description: "List GCE instances, optionally scoped to a zone via --zone."
  version: 0.1.0
  labels: { stability: beta, risk: low }

spec:
  command: { namespace: infra, target: gcp, noun: [vm], verb: list }
  mode: read
  timeout: 30s
  profile: { kind: gcp, required: true }

  args:
    - { name: zone, flag: --zone, type: string }

  bash:
    argv:
      - gcloud
      - compute
      - instances
      - list
      - --format=json

  output:
    parse: json
    kind: table
    columns:
      - { key: name,          label: "Name" }
      - { key: zone,          label: "Zone" }
      - { key: status,        label: "State", renderer: state-badge }
      - { key: machineType,   label: "Type" }
      - { key: creationTimestamp, label: "Created", renderer: relative-time }
