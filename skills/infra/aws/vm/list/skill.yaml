apiVersion: slash/v1
kind: Skill
metadata:
  id: infra.aws.vm.list
  name: "List AWS EC2 instances"
  description: "List EC2 instances in a region. Repeat --tag to add Name=tag:<k>,Values=<v> filters."
  version: 0.1.0
  labels: { stability: beta, risk: low }

spec:
  command: { namespace: infra, target: aws, noun: [vm], verb: list }
  mode: read
  danger: false
  approvers: 0
  timeout: 30s

  profile: { kind: aws, required: true }

  args:
    - { name: region, flag: --region, type: string, default: "us-east-1" }
    - { name: tag,    flag: --tag,    type: "map<string,string>", repeatable: true }

  bash:
    argv:
      - aws
      - ec2
      - describe-instances
      - --region
      - "${region}"
      - --output
      - json
    expand:
      - when: tag
        as: ["--filters", "Name=tag:${key},Values=${value}"]

  output:
    parse: json
    path: "Reservations[].Instances[]"
    kind: table
    row_actions:
      - { label: "Get",    command: "/infra aws vm get ${InstanceId}" }
      - { label: "Start",  command: "/infra aws vm start ${InstanceId} --reason " }
      - { label: "Stop",   command: "/infra aws vm stop ${InstanceId} --reason " }
      - { label: "Reboot", command: "/infra aws vm reboot ${InstanceId} --reason " }
      - { label: "Resize", command: "/infra aws vm resize ${InstanceId} --type  --reason " }
    columns:
      - { key: InstanceId,           label: "ID" }
      - { key: Tags.Name,            label: "Name", fallback: "-" }
      - { key: State.Name,           label: "State", renderer: state-badge }
      - { key: InstanceType,         label: "Type" }
      - { key: Placement.AvailabilityZone, label: "AZ" }
      - { key: LaunchTime,           label: "Launched", renderer: relative-time }
