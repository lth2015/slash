cases:
  - name: "happy path"
    input: "/infra aws vm list --region us-east-1"
    mock:
      stdout: "happy.json"
      exit: 0
    expect:
      state: "ok"
      outputs_len: 2
      outputs_row0:
        InstanceId: "i-0a1b2c3d"
        State.Name: "running"

  - name: "empty region"
    input: "/infra aws vm list --region eu-west-2"
    mock:
      stdout: "empty.json"
      exit: 0
    expect:
      state: "ok"
      outputs_len: 0

  - name: "aws exec error surfaces ExecutionError"
    input: "/infra aws vm list --region us-east-1"
    mock:
      stdout: "empty.json"
      exit: 254
      stderr: "An error occurred (AuthFailure) when calling the DescribeInstances operation"
    expect:
      state: "error"
      error_code: "ExecutionError"
