cases:
  - name: "happy path"
    input: "/infra aws sg list --region us-east-1"
    mock:
      stdout: "happy.json"
      exit: 0
    expect:
      state: "ok"
      outputs_len: 2
      outputs_row0:
        GroupId: "sg-0abc"

  - name: "filtered by vpc"
    input: "/infra aws sg list --region us-east-1 --vpc vpc-01"
    mock:
      stdout: "happy.json"
      exit: 0
    expect:
      state: "ok"
      outputs_len: 2
