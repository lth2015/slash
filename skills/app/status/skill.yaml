apiVersion: slash/v1
kind: Skill
metadata:
  id: app.status
  name: "Application status"
  description: "Read-only health summary for an app: replica counts, conditions, last rollout."
  version: 0.1.0
  labels: { stability: alpha, risk: low }

spec:
  command: { namespace: app, noun: [], verb: status }
  mode: read
  timeout: 20s
  # /app wraps the backing deployment; kubectl is the universal backend
  # we already trust. Backend picks are deliberately unsophisticated in
  # this PoC: one skill → one CLI invocation (see docs/04-skills.md §1).
  profile: { kind: k8s, required: true }

  args:
    - { name: name, type: string, positional: true, required: true }
    - { name: ns,   flag: --ns,   type: string, required: true }

  bash:
    argv:
      - kubectl
      - --context
      - "${profile.k8s.context}"
      - -n
      - "${ns}"
      - get
      - deployment
      - "${name}"
      - -o
      - json

  # The whole Deployment JSON is overkill for a "status" view. We zero in on
  # .status, which carries the reconciled replica counts and the Available /
  # Progressing conditions an SRE actually wants to see.
  output:
    parse: json
    path: "status"
    kind: object
